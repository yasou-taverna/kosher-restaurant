
<!doctype html>
<html dir="rtl" lang="he">

<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="images/icon.ico" rel="icon" type="image/x-icon">
<title>איך מגיעים – טברנה יאסו רודוס</title>
<link href="css/style.css" rel="stylesheet">
<style>
:root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --brand: #0069a8;
    --brand-dark: #003b66;
    --shadow: 0 18px 45px rgba(0,30,55,.14);
}

body { min-height: 100vh; }

.hero-subtitle {
    margin: 0;
    color: #f7da95;
    font-size: 16px;
    font-weight: 700;
}

.page-wrap {
    max-width: 900px;
    margin: 32px auto 60px;
    padding: 0 18px;
}

.card {
    background: var(--panel);
    border-radius: 22px;
    padding: 26px;
    box-shadow: var(--shadow);
}

h1 {
    text-align: center;
    color: #444;
    margin: 0 0 18px;
    font-size: 1.8rem;
}

/* עוטף אחראי לריספונסיביות של המפה */
.map-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 75%; /* יחס גובה-רוחב של המפה */
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,.15);
}

.map-wrap iframe {
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

.nav-btn {
    display: block;
    text-align: center;
    background: var(--brand);
    color: #fff;
    font-size: 1.15rem;
    font-weight: 700;
    padding: 16px;
    border-radius: 14px;
    margin-top: 20px;
    transition: background .2s;
}

.nav-btn:hover {
    background: var(--brand-dark);
}

.address {
    text-align: center;
    color: #555;
    margin-top: 10px;
    font-size: 1rem;
}

@media (max-width: 640px) {
    h1 { font-size: 1.4rem; }
    .card { padding: 18px; border-radius: 16px; }
    .map-wrap { padding-bottom: 100%; }
}
</style>
</head>

<body>

<header class="hero">
	<button class="openbtn" onclick="openNav()">☰</button>
    <img alt="טברנה יאסו רודוס" height="48" src="images/Logo.png" width="200">
	<p class="hero-subtitle">Kosher Tavern Cuisine</p>
	<div id="mySidepanel" class="sidepanel">
		<a class="closebtn" href="javascript:void(0)" onclick="closeNav()">×</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">דף הבית</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">תפריט</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/privacy-policy.html">מדיניות פרטיות</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Contact-Us.html">צור קשר</a> 
	    <a href="https://yasou-taverna.github.io/kosher-restaurant/Kosher-Certificate.html">תעודת כשרות</a>
		<a class="active" href="https://yasou-taverna.github.io/kosher-restaurant/Location.html">המיקום שלנו</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/booking.html">הזמנת שולחן</a>
	</div>
</header>

<main class="page-wrap">
  <article class="card">
    <h1>איך מגיעים אלינו</h1>

    <!--
      החלף את ה-src בקוד ה-Embed שמקבלים מ-Google Maps:
      Google Maps -> חיפוש הכתובת -> שתף -> הטמעת מפה -> העתק את ה-src בלבד
    -->
    <div class="map-wrap">
      <iframe
        src="https://www.google.com/maps?q=36.4179368,28.1772314&z=17&output=embed"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

    <p class="address">Leof. Iraklidon 131, Ialisos 851 01, Greece</p>

    <!--
      כפתור ניווט: פותח ישירות את אפליקציית המפות של הטלפון (גוגל מפות/אפל מפות)
      עדכן את הכתובת אחרי q= (אפשר גם קואורדינטות: lat,lng)
    -->
    <a class="nav-btn"
       href="https://www.google.com/maps/dir/?api=1&destination=36.4179368,28.1772314"
       target="_blank" rel="noopener">
      🧭 נווט אליי עם גוגל מפות
    </a>

  </article>
</main>

<script>
function openNav() {
  document.getElementById("mySidepanel").style.width = "250px";
}
function closeNav() {
  document.getElementById("mySidepanel").style.width = "0";
}
</script>
<script src="js/faq-data.js"></script>	
<script src="js/chatbot.js"></script
</body>
</html>
