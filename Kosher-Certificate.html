

<!doctype html>
<html dir="rtl" lang="he">

<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="images/icon.ico" rel="icon" type="image/x-icon">
<title>תעודת כשרות – טברנה יאסו רודוס</title>
<link href="css/style.css" rel="stylesheet">
<style>
:root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --panel-strong: #eaf3fb;
    --text: #222;
    --muted: #6e746d;
    --line: #dde3ea;
    --brand: #0069a8;
    --brand-dark: #003b66;
    --gold: #f7da95;
    --danger: #c9463d;
    --shadow: 0 18px 45px rgba(0,30,55,.14);
}

body {
    min-height: 100vh;
}

.hero-subtitle {
    margin: 0;
    color: var(--gold);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .4px;
}

.page-wrap {
    max-width: 900px;
    margin: 32px auto 60px;
    padding: 0 18px;
}

.card {
    background: var(--panel);
    border-radius: 22px;
    padding: 26px 26px 30px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(221,227,234,.8);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: -40%;
    background: radial-gradient(circle at 0 0, rgba(0,105,168,.10), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(0,59,102,.10), transparent 55%);
    opacity: .9;
    pointer-events: none;
}

.card-inner {
    position: relative;
    z-index: 1;
}

h1 {
    margin: 0 0 10px;
    font-size: 2rem;
    letter-spacing: .5px;
    text-align: center;
    color: #444;
}

.subtitle {
    margin: 0 0 18px;
    color: var(--muted);
    font-size: 1.05rem;
}

section.block {
    margin: 18px 0 12px;
    padding: 14px 16px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,.82);
    border: 1px solid rgba(221,227,234,.9);
}

section.block.highlight {
    background: var(--panel-strong);
    border-color: rgba(0,105,168,.35);
}

section.block h2 {
    margin: 0 0 8px;
    font-size: 1.2rem;
    color: var(--brand-dark);
}

p {
    margin: 4px 0;
    line-height: 1.6;
    font-size: 1rem;
}

.list {
    margin: 4px 0 6px;
    padding: 0;
    list-style: none;
}

.list li {
    margin: 2px 0;
    line-height: 1.6;
}

.list li::before {
    content: "• ";
    color: var(--brand);
    font-weight: bold;
}

.phone {
    font-weight: 900;
    color: var(--brand-dark);
}

.note {
    font-size: .95rem;
    color: var(--muted);
    margin-top: 6px;
}

.danger {
    color: var(--danger);
    font-weight: 700;
}

@media (max-width: 640px) {
    h1 { font-size: 1.6rem; }
    .subtitle { font-size: 0.95rem; }
    p { font-size: 0.95rem; line-height: 1.55; }
    section.block { padding: 12px 14px; }
    .card { padding: 18px 16px 20px; border-radius: 16px; }
    .page-wrap { margin: 20px auto 35px; padding: 0 10px; }
}
	/* ===========================
   style.css - קובץ עיצוב משותף לכל 4 הדפים
   טברנה יאסו רודוס - עיצוב כחול
=========================== */

* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
	font-family: Arial, Helvetica, sans-serif;
	background: #f7f7f7;
	color: #222;
}

a {
	color: inherit;
	text-decoration: none;
}

/* ===========================
   HEADER - זהה בכל הדפים
=========================== */
header {
	background: linear-gradient(to bottom, #0069a8, #003b66);
	color: white;
	text-align: center;
	padding: 30px 15px 20px;
	position: relative;
}

header h1 {
	font-size: 40px;
	letter-spacing: 3px;
	margin-bottom: 5px;
}

header p {
	font-size: 18px;
	margin-bottom: 15px;
}

header img {
	margin-bottom: 8px;
}

/* כפתור פתיחת תפריט צד */
.openbtn {
	font-size: 26px;
	cursor: pointer;
	background-color: transparent;
	color: white;
	padding: 10px 15px;
	border: none;
	position: absolute;
	top: 20px;
	right: 20px;
}

.openbtn:hover {
	color: #f7da95;
}

/* פנל ניווט צד */
.sidepanel {
	width: 0;
	position: fixed;
	z-index: 100;
	height: 100%;
	top: 0;
	right: 0;
	background-color: #003b66;
	overflow-x: hidden;
	transition: 0.4s;
	padding-top: 60px;
}

.sidepanel a {
	padding: 12px 25px;
	text-decoration: none;
	font-size: 22px;
	color: #ffffff;
	display: block;
	transition: 0.3s;
}

.sidepanel a:hover,
.sidepanel a.active {
	color: #f7da95;
}

.sidepanel .closebtn {
	position: absolute;
	top: 10px;
	left: 20px;
	font-size: 40px;
	color: white;
}

/* מיתוג שפה (בדף התפריט) */
.lang-switcher {
	display: flex;
	justify-content: center;
	gap: 12px;
	margin-top: 10px;
}

.lang-btn {
	background: rgba(255,255,255,0.15);
	border: 2px solid rgba(255,255,255,0.5);
	border-radius: 8px;
	color: white;
	padding: 6px 12px;
	cursor: pointer;
	font-size: 14px;
}

.lang-btn.active {
	background: white;
	color: #003b66;
}

/* ===========================
   ריספונסיביות משותפת
=========================== */
@media (max-width: 640px) {
	header {
		padding: 18px 10px;
	}

	header h1 {
		font-size: 28px;
	}

	header p {
		font-size: 15px;
	}

	.openbtn {
		font-size: 22px;
		top: 14px;
		right: 14px;
		padding: 6px 10px;
	}

	.sidepanel a {
		font-size: 20px;
		padding: 10px 20px;
	}
}
</style>
</head>

<body>

<header class="hero">
 <button class="openbtn" onclick="openNav()">☰</button>
 <img alt="טברנה יאסו רודוס" height="48" src="images/Logo.png" width="200">
	<p class="hero-subtitle">Kosher Tavern Cuisine</p>
  <div id="mySidepanel" class="sidepanel">
		<a class="closebtn" href="javascript:void(0)" onclick="closeNav()">×</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">דף הבית</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/menu.html">תפריט</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/privacy-policy.html">מדיניות פרטיות</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Contact-Us.html">צור קשר</a>
		<a class="active" href="https://yasou-taverna.github.io/kosher-restaurant/Kosher Certificate.html">תעודת כשרות</a>
		 </div>

</header>

<main class="page-wrap">
  <article class="card">
	  <div class="card-inner">
		  <h1>תעודת כשרות</h1>
		  
		  <img src="images/תעודת כשרות.png" alt="תעודת כשרות" width="776" height="1000" />
		 
	  </div>
</article>
</main>
<script>
function openNav() {
  document.getElementById("mySidepanel").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidepanel").style.width = "0";
}
</script>

</body>

</html>
