<!doctype html>
<html dir="rtl" lang="he">

<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="images/icon.ico" rel="icon" type="image/x-icon">
<title>גלריה – טברנה יאסו רודוס</title>
<link href="css/style.css" rel="stylesheet">
<style>
.gallery-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 30px 18px 60px;
}

.gallery-title {
  text-align: center;
  color: #444;
  margin-bottom: 24px;
  font-size: 1.8rem;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.gallery-item {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 1 / 1;
  background: #eee;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

.gallery-item img,
.gallery-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .25s ease;
}

.gallery-item:hover img,
.gallery-item:hover video {
  transform: scale(1.05);
}

.gallery-item .play-badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: rgba(0,59,102,0.75);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  pointer-events: none;
}

/* תיבת תצוגה מוגדלת (lightbox) */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

#lightbox.open { display: flex; }

#lightbox img,
#lightbox video {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 8px;
}

#lightbox-close {
  position: absolute;
  top: 18px;
  left: 22px;
  font-size: 36px;
  color: #fff;
  cursor: pointer;
  line-height: 1;
}

@media (max-width: 640px) {
  .gallery-title { font-size: 1.4rem; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
}
</style>
</head>

<body>

<header class="hero">
 <button class="openbtn" onclick="openNav()">☰</button>
 <img alt="טברנה יאסו רודוס" height="48" src="images/Logo.png" width="200">
	<p class="hero-subtitle">Kosher Tavern Cuisine</p>
  <div id="mySidepanel" class="sidepanel">
		<a class="closebtn" href="javascript:void(0)" onclick="closeNav()">×</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">דף הבית</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/menu.html">תפריט</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/privacy-policy.html">מדיניות פרטיות</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Contact-Us.html">צור קשר</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Kosher-Certificate.html">תעודת כשרות</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Location.html">איך מגיעים</a>
		<a class="active" href="https://yasou-taverna.github.io/kosher-restaurant/Gallery.html">גלריה</a>
  </div>
</header>

<main class="gallery-wrap">
  <h1 class="gallery-title">גלריית תמונות וסרטונים</h1>
  <div id="gallery-grid" class="gallery-grid"></div>
</main>

<div id="lightbox">
  <span id="lightbox-close">×</span>
  <div id="lightbox-content"></div>
</div>

<script>
/* ===========================================================
   רשימת התוכן של הגלריה — כאן ורק כאן עורכים תמונות/סרטונים
   type: "image" או "video"
   src:  הנתיב לקובץ (העלה את הקבצים לתיקיית images/gallery)
   ===========================================================
   דוגמאות - תחליף לפי הקבצים האמיתיים שהעלית:
*/
const GALLERY_ITEMS = [
  { type: "image", src: "images/gallery/photo1.jpeg" },
  { type: "image", src: "images/gallery/photo2.jpeg" },
  { type: "image", src: "images/gallery/photo3.jpeg" },
  { type: "image", src: "images/gallery/photo4.jpeg" },
  { type: "video", src: "images/gallery/video1.mp4" },
  { type: "image", src: "images/gallery/photo5.jpeg" },
  { type: "image", src: "images/gallery/photo6.jpeg" },
  { type: "video", src: "images/gallery/video2.mp4" }
];

const grid = document.getElementById("gallery-grid");
const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightbox-content");

GALLERY_ITEMS.forEach(item => {
  const cell = document.createElement("div");
  cell.className = "gallery-item";

  if (item.type === "image") {
    const img = document.createElement("img");
    img.src = item.src;
    img.alt = "תמונה מהמסעדה";
    img.loading = "lazy";
    cell.appendChild(img);
  } else {
    const video = document.createElement("video");
    video.src = item.src;
    video.muted = true;
    video.preload = "metadata";
    cell.appendChild(video);

    const badge = document.createElement("div");
    badge.className = "play-badge";
    badge.textContent = "▶";
    cell.appendChild(badge);
  }

  cell.onclick = () => openLightbox(item);
  grid.appendChild(cell);
});

function openLightbox(item) {
  lightboxContent.innerHTML = "";
  if (item.type === "image") {
    const img = document.createElement("img");
    img.src = item.src;
    lightboxContent.appendChild(img);
  } else {
    const video = document.createElement("video");
    video.src = item.src;
    video.controls = true;
    video.autoplay = true;
    lightboxContent.appendChild(video);
  }
  lightbox.classList.add("open");
}

function closeLightbox() {
  lightbox.classList.remove("open");
  lightboxContent.innerHTML = "";
}

document.getElementById("lightbox-close").onclick = closeLightbox;
lightbox.onclick = e => {
  if (e.target === lightbox) closeLightbox();
};

function openNav() {
  document.getElementById("mySidepanel").style.width = "250px";
}
function closeNav() {
  document.getElementById("mySidepanel").style.width = "0";
}
</script>

</body>
</html>
