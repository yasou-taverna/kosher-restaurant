<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="images/icon.ico" rel="icon" type="image/x-icon">
<title>צור קשר – טברנה יאסו רודוס</title>
<link href="css/style.css" rel="stylesheet">
<style>
.flag {
	font-size: 20px;
}
.hero-subtitle {
	margin: 0;
	color: #f7da95;
	font-size: 16px;
	font-weight: 700;
	letter-spacing: .4px;
}
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 20px;
}
.category {
	margin-top: 28px;
}
.card {
	background: white;
	padding: 16px;
	border-radius: 12px;
	box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.card h3 {
	color: #0069a8;
	margin-bottom: 6px;
	font-size: 17px;
}
footer {
	background: #003b66;
	color: white;
	padding: 20px;
	text-align: center;
	margin-top: 40px;
	font-size: 15px;
}
.contact-form {
	max-width: 400px;
	margin: 40px auto;
	padding: 20px;
	border: 1px solid #ccc;
	border-radius: 8px;
}
.contact-form label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
}
.contact-form input, .contact-form textarea {
	width: 100%;
	padding: 8px;
	margin-bottom: 12px;
	box-sizing: border-box;
}
.contact-form button {
	padding: 10px 16px;
	background-color: #0078d4;
	color: #fff;
	border: none;
	border-radius: 4px;
	cursor: pointer;
}
.contact-form button:hover {
	background-color: #005ea6;
}
/* ===========================
   style.css - קובץ עיצוב משותף לכל 4 הדפים
   טברנה יאסו רודוס - עיצוב כחול
=========================== */

* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
	font-family: Arial, Helvetica, sans-serif;
	background: #f7f7f7;
	color: #222;
}

a {
	color: inherit;
	text-decoration: none;
}

/* ===========================
   HEADER - זהה בכל הדפים
=========================== */
header {
	background: linear-gradient(to bottom, #0069a8, #003b66);
	color: white;
	text-align: center;
	padding: 30px 15px 20px;
	position: relative;
}

header h1 {
	font-size: 40px;
	letter-spacing: 3px;
	margin-bottom: 5px;
}

header p {
	font-size: 18px;
	margin-bottom: 15px;
}

header img {
	margin-bottom: 8px;
}

/* כפתור פתיחת תפריט צד */
.openbtn {
	font-size: 26px;
	cursor: pointer;
	background-color: transparent;
	color: white;
	padding: 10px 15px;
	border: none;
	position: absolute;
	top: 20px;
	right: 20px;
}

.openbtn:hover {
	color: #f7da95;
}

/* פנל ניווט צד */
.sidepanel {
	width: 0;
	position: fixed;
	z-index: 100;
	height: 100%;
	top: 0;
	right: 0;
	background-color: #003b66;
	overflow-x: hidden;
	transition: 0.4s;
	padding-top: 60px;
}

.sidepanel a {
	padding: 12px 25px;
	text-decoration: none;
	font-size: 22px;
	color: #ffffff;
	display: block;
	transition: 0.3s;
}

.sidepanel a:hover,
.sidepanel a.active {
	color: #f7da95;
}

.sidepanel .closebtn {
	position: absolute;
	top: 10px;
	left: 20px;
	font-size: 40px;
	color: white;
}

/* מיתוג שפה (בדף התפריט) */
.lang-switcher {
	display: flex;
	justify-content: center;
	gap: 12px;
	margin-top: 10px;
}

.lang-btn {
	background: rgba(255,255,255,0.15);
	border: 2px solid rgba(255,255,255,0.5);
	border-radius: 8px;
	color: white;
	padding: 6px 12px;
	cursor: pointer;
	font-size: 14px;
}

.lang-btn.active {
	background: white;
	color: #003b66;
}

/* ===========================
   ריספונסיביות משותפת
=========================== */
@media (max-width: 640px) {
	header {
		padding: 18px 10px;
	}

	header h1 {
		font-size: 28px;
	}

	header p {
		font-size: 15px;
	}

	.openbtn {
		font-size: 22px;
		top: 14px;
		right: 14px;
		padding: 6px 10px;
	}

	.sidepanel a {
		font-size: 20px;
		padding: 10px 20px;
	}
}	
</style>
</head>
<body>

<header class="hero">
	<button class="openbtn" onclick="openNav()">☰</button>
    <img alt="טברנה יאסו רודוס" height="48" src="images/Logo.png" width="200">
	<p class="hero-subtitle">Kosher Tavern Cuisine</p>
	<div id="mySidepanel" class="sidepanel">
		<a class="closebtn" href="javascript:void(0)" onclick="closeNav()">×</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">דף הבית</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/">תפריט</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/privacy-policy.html">מדיניות פרטיות</a>
		<a class="active" href="https://yasou-taverna.github.io/kosher-restaurant/Contact-Us.html">צור קשר</a> 
	    <a href="https://yasou-taverna.github.io/kosher-restaurant/Kosher-Certificate.html">תעודת כשרות</a>
		<a href="https://yasou-taverna.github.io/kosher-restaurant/Location.html">המיקום שלנו</a>
		<a class="active" href="https://yasou-taverna.github.io/kosher-restaurant/booking.html">הזמנת שולחן</a>
	</div>
</header>

<div class="container">
	  <form class="contact-form" onsubmit="sendToWhatsApp(event)">
		  <h2>צור קשר</h2>
		  <label>שם מלא</label> <input id="name" required="" type="text"> <label>
		  אימייל</label> <input id="email" required="" type="email"> <label>טלפון</label>
		  <input id="phone" type="tel"> <label>נושא</label>
		  <input id="subject" type="text"> <label>הודעה</label>
		  <textarea id="message" required="" rows="5"></textarea>
		  <button type="submit">שלח</button>
	  </form>
</div>
<script>
function sendToWhatsApp(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  const text =
    `פנייה חדשה מהאתר:\n` +
    `שם: ${name}\n` +
    `אימייל: ${email}\n` +
    `טלפון: ${phone}\n` +
    `נושא: ${subject}\n` +
    `הודעה:\n${message}`;

  const encoded = encodeURIComponent(text);

  // כמה מספרים שאתה רוצה
  const numbers = ["306981899433"];

  numbers.forEach(num => {
    window.open(`https://wa.me/${num}?text=${encoded}`, "_blank");
  });
}
</script>
<script>
function openNav() {
  document.getElementById("mySidepanel").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidepanel").style.width = "0";
}
</script>
<script src="js/faq-data.js"></script>	
<script src="js/chatbot.js"></script
</body>

</html>
